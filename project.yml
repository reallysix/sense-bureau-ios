name: SenseBureau

options:
  bundleIdPrefix: com.sensebureau
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0

targets:
  SenseBureau:
    type: application
    platform: iOS
    sources:
      - path: SenseBureau
    info:
      path: SenseBureau/Info.plist
      properties:
        CFBundleDisplayName: Sense Bureau
        UILaunchScreen: {}
        UIAppFonts:
          - Doto-Variable.ttf
        NSMotionUsageDescription: Sense Bureau uses motion sensors to measure magnetic-field changes, vibration, device level, pressure, and relative height.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sensebureau.ios
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: true

  SenseBureauTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SenseBureauTests
    dependencies:
      - target: SenseBureau
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sensebureau.ios.tests
        GENERATE_INFOPLIST_FILE: true

  SenseBureauUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SenseBureauUITests
    dependencies:
      - target: SenseBureau
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sensebureau.ios.uitests
        GENERATE_INFOPLIST_FILE: true

schemes:
  SenseBureau:
    build:
      targets:
        SenseBureau: all
        SenseBureauTests: [test]
        SenseBureauUITests: [test]
    test:
      targets:
        - SenseBureauTests
        - SenseBureauUITests
